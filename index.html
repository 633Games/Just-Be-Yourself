<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rent is Due (Y2K Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- The Physical Phone Casing -->
    <div class="phone-shell relative w-full max-w-[360px] h-[85vh] max-h-[750px] bg-[var(--phone-body)] rounded-[3rem] p-4 shadow-[15px_15px_30px_rgba(0,0,0,0.5),inset_-5px_-5px_15px_rgba(255,255,255,0.1)] flex flex-col border border-zinc-700">
        
        <!-- Earpiece -->
        <div class="w-16 h-2 bg-zinc-900 rounded-full mx-auto mt-2 mb-6 shadow-inner"></div>
        
        <!-- Brand -->
        <div class="text-center text-zinc-500 text-[10px] tracking-[0.3em] mb-1 font-sans font-bold">N O K I A</div>

        <!-- The Screen Hardware Bezel -->
        <div class="phone-bezel p-2 bg-zinc-900 rounded-xl flex-1 flex flex-col shadow-inner relative min-h-0">
            
            <!-- THE ACTUAL SOFTWARE SCREEN -->
            <div class="phone-display nokia-screen rounded-lg flex flex-col overflow-hidden relative border-[3px] border-[#6b8519] min-h-0">
                
                <!-- OS Header Bar -->
                <header class="flex justify-between items-end p-2 border-b-2 border-[var(--lcd-pixel)] shrink-0 z-20 relative">
                    <div class="flex items-end gap-1 text-[10px]">
                        <span class="inline-block w-1 h-3 bg-[var(--lcd-pixel)]"></span>
                        <span class="inline-block w-1 h-4 bg-[var(--lcd-pixel)]"></span>
                        <span class="inline-block w-1 h-5 bg-[var(--lcd-pixel)]"></span>
                        <span class="inline-block w-1 h-5 border border-[var(--lcd-pixel)]"></span>
                    </div>
                    
                    <div class="text-center leading-none">
                        <div id="ui-cash" class="text-lg">$0.00</div>
                    </div>
                    
                    <div class="flex items-center gap-1 text-[10px]">
                        <span id="ui-rent-timer">11/15/05</span>
                        <div class="w-6 h-3 border-2 border-[var(--lcd-pixel)] p-[1px] flex gap-[1px]">
                            <div class="flex-1 bg-[var(--lcd-pixel)]"></div>
                            <div class="flex-1 bg-[var(--lcd-pixel)]"></div>
                            <div class="flex-1 bg-[var(--lcd-pixel)]"></div>
                        </div>
                    </div>
                </header>

                <main class="phone-main flex-1 flex flex-col min-h-0 overflow-hidden z-20">

                    <!-- === NAME SETUP (FIRST BOOT) === -->
                    <div id="name-setup-view" class="app-screen w-full hidden flex-col p-4 justify-center gap-3">
                        <div class="text-[10px] text-center mb-1">NEW PHONE SETUP</div>
                        <div class="text-[9px] text-center opacity-80 mb-2">ENTER YOUR NAME</div>
                        <input
                            id="player-name-input"
                            type="text"
                            maxlength="16"
                            placeholder="YOUR NAME"
                            class="nokia-input"
                            onkeydown="if (event.key === 'Enter') submitPlayerName()"
                        />
                        <button onclick="submitPlayerName()" class="nokia-btn nokia-btn-outline py-2 justify-center text-[10px] mt-1">
                            POWER ON
                        </button>
                    </div>
                    
                    <!-- === HOME MENU VIEW === -->
                    <div id="home-view" class="app-screen w-full hidden flex-col">
                        <div class="flex-1 flex flex-col p-2 gap-1 justify-center">
                            <div class="text-[10px] mb-1">SELECT APP:</div>
                            
                            <button id="btn-app-messages" onclick="openMessages()" class="nokia-btn hidden">
                                <span id="ui-menu-messages-label">1- MESSAGES</span>
                                <span class="flex items-center gap-1">
                                    <span id="messages-unread-badge" class="hidden text-[8px] border border-[var(--lcd-pixel)] px-1">0</span>
                                    <span>></span>
                                </span>
                            </button>
                            
                            <button id="btn-app-work" onclick="switchView('job-view')" class="nokia-btn hidden">
                                <span id="ui-menu-job-btn">2- [WORK] PIZZA SHIFT</span>
                                <span>></span>
                            </button>
                            
                            <button id="btn-app-cv" onclick="openCV()" class="nokia-btn hidden">
                                <span id="ui-menu-cv-label">3- MY CV</span>
                                <span>></span>
                            </button>

                            <button id="btn-app-jobs" onclick="openJobSearcher()" class="nokia-btn hidden">
                                <span id="ui-menu-jobs-label">4- JOB SEARCHER</span>
                                <span>></span>
                            </button>

                            <button id="btn-app-casino" onclick="openCasino()" class="nokia-btn hidden">
                                <span id="ui-menu-casino-label">5- CASINO</span>
                                <span>></span>
                            </button>
                        </div>
                    </div>

                    <!-- === MESSAGES APP (CONTACT LIST) === -->
                    <div id="messages-view" class="app-screen w-full hidden flex-col">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>MESSAGES</span>
                            <span class="blinking">_</span>
                        </div>
                        <div id="messages-contact-list" class="thread-scroll p-2 flex flex-col gap-1">
                            <!-- Contacts injected by JS -->
                        </div>
                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)]">
                            <button onclick="switchView('home-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ BACK TO HOME ]
                            </button>
                        </div>
                    </div>

                    <!-- === MESSAGES THREAD === -->
                    <div id="messages-thread-view" class="app-screen w-full hidden flex-col">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span id="messages-thread-title">MOM</span>
                            <span class="blinking">_</span>
                        </div>
                        <div id="messages-thread-log" class="thread-scroll p-2 flex flex-col text-[11px] leading-tight">
                            <!-- Thread messages injected by JS -->
                        </div>
                        <div id="messages-thread-footer" class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)] flex flex-col gap-2">
                            <button id="btn-pay-rent" onclick="payWeeklyRent()" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px] hidden">
                                [ PAY WEEKLY RENT $<span id="rent-pay-amount">50.00</span> ]
                            </button>
                            <div id="message-reply-row" class="flex flex-col gap-1">
                                <div class="flex gap-1 items-stretch">
                                    <input
                                        id="message-reply-input"
                                        type="text"
                                        maxlength="100"
                                        placeholder="REPLY..."
                                        class="nokia-input nokia-input-reply flex-1 normal-case"
                                        oninput="updateReplyCharCount()"
                                        onkeydown="if (event.key === 'Enter') sendPlayerReply()"
                                    />
                                    <button
                                        onclick="sendPlayerReply()"
                                        class="nokia-btn nokia-btn-outline nokia-send-btn shrink-0"
                                        aria-label="Send reply"
                                    >&gt;</button>
                                </div>
                                <div id="message-reply-count" class="text-[8px] opacity-70 text-right normal-case">0/100</div>
                            </div>
                            <button onclick="backToMessagesList()" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ BACK ]
                            </button>
                        </div>
                    </div>

                    <!-- === JOB VIEW === -->
                    <div id="job-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span id="ui-current-job-title">PIZZA SHIFT</span>
                            <span class="blinking">_</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col p-2 justify-center relative overflow-hidden">
                            <!-- Start UI -->
                            <div id="shift-start-ui" class="flex flex-col items-center gap-2">
                                <button onclick="startPizzaShift()" class="nokia-btn nokia-btn-outline w-full py-4 text-[12px] font-bold text-center justify-center">
                                    START SHIFT
                                </button>
                                <button onclick="switchView('home-view')" class="nokia-btn text-center justify-center text-[10px]">
                                    [ CANCEL ]
                                </button>
                            </div>
                            
                            <!-- Active UI -->
                            <div id="shift-active-ui" class="hidden flex-col h-full w-full relative">
                                <div class="flex justify-between text-[10px] mb-1">
                                    <span>TIME: <span id="ui-shift-timer">00:00</span></span>
                                    <span>EARN: <span id="ui-shift-earned">$0.00</span></span>
                                </div>
                                <div class="w-full h-2 border-2 border-[var(--lcd-pixel)] p-[1px] mb-2 shrink-0">
                                    <div id="ui-shift-progress" class="h-full bg-[var(--lcd-pixel)]" style="width: 0%;"></div>
                                </div>
                                
                                <!-- Tips spawn here -->
                                <div id="tip-container" class="flex-1 relative border border-dashed border-[var(--lcd-pixel)] opacity-80 overflow-hidden">
                                    <div class="absolute inset-0 flex items-center justify-center text-[10px] opacity-30 pointer-events-none text-center">
                                        WORKING...
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)] hidden" id="btn-end-shift">
                            <button onclick="endPizzaShift(true)" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ CLOCK OUT ]
                            </button>
                        </div>
                    </div>

                    <!-- === CV VIEW === -->
                    <div id="cv-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>MY CV</span>
                            <span id="cv-equipped-count">0/2</span>
                        </div>
                        <div id="cv-content" class="flex-1 overflow-y-auto p-2 flex flex-col pb-4">
                            <!-- JS injects CV items here -->
                        </div>
                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)]">
                            <button onclick="switchView('home-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ BACK TO HOME ]
                            </button>
                        </div>
                    </div>

                    <!-- === JOB SEARCHER VIEW === -->
                    <div id="job-searcher-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>JOB SEARCHER</span>
                            <span class="blinking">_</span>
                        </div>
                        <div id="job-list-content" class="flex-1 overflow-y-auto p-2 flex flex-col gap-2 pb-6">
                            <!-- JS injects Jobs here -->
                        </div>
                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)] bg-[var(--lcd-bg)] z-10">
                            <button onclick="switchView('home-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ BACK TO HOME ]
                            </button>
                        </div>
                    </div>

                    <!-- === GAMBLE MENU VIEW === -->
                    <div id="gamble-menu-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>WEB: CASINO</span>
                            <span class="blinking">_</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col p-2 gap-2 justify-center">
                            <button onclick="initScratch()" class="nokia-btn">
                                <span>1- SCRATCH ($1)</span>
                                <span>></span>
                            </button>
                            <button onclick="initBlackjack()" class="nokia-btn">
                                <span>2- BLACKJACK</span>
                                <span>></span>
                            </button>
                        </div>

                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)]">
                            <button onclick="switchView('home-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ BACK TO HOME ]
                            </button>
                        </div>
                    </div>

                    <!-- === SCRATCH VIEW === -->
                    <div id="scratch-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>SCRATCH-O</span>
                            <span>WIN $5</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col items-center justify-center p-2 gap-4">
                            <div class="text-[10px] text-center">FIND THE [$] TO WIN!</div>
                            
                            <div class="flex gap-2 w-full justify-center" id="scratch-boxes">
                                <!-- Generated by JS -->
                            </div>

                            <button id="btn-buy-scratch" onclick="buyScratch()" class="nokia-btn nokia-btn-outline w-full py-2">
                                BUY TICKET (-$1.00)
                            </button>
                        </div>

                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)]">
                            <button onclick="switchView('gamble-menu-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ LEAVE ]
                            </button>
                        </div>
                    </div>

                    <!-- === BLACKJACK VIEW === -->
                    <div id="blackjack-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span>BLACKJACK</span>
                            <span id="bj-status">BET</span>
                        </div>
                        
                        <!-- Betting Screen -->
                        <div id="bj-bet-screen" class="flex-1 flex flex-col items-center justify-center p-2 gap-2">
                            <div class="text-[10px]">WAGER:</div>
                            <div class="text-xl border-b-2 border-[var(--lcd-pixel)] mb-2" id="bj-bet-amount">$1.00</div>
                            <div class="flex gap-2 w-full">
                                <button onclick="changeBjBet(-1)" class="nokia-btn nokia-btn-outline flex-1 py-1">[-$1]</button>
                                <button onclick="changeBjBet(1)" class="nokia-btn nokia-btn-outline flex-1 py-1">[+$1]</button>
                            </div>
                            <button onclick="changeBjBet('max')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px] opacity-80">[ MAX BET ]</button>
                            
                            <button onclick="startBjDeal()" class="nokia-btn w-full py-2 border-2 border-[var(--lcd-pixel)] mt-2 font-bold text-center justify-center">
                                DEAL CARDS
                            </button>
                        </div>

                        <!-- Active Game Screen -->
                        <div id="bj-active-screen" class="hidden flex-1 flex flex-col p-2 gap-2">
                            <div class="border-2 border-[var(--lcd-pixel)] p-1 flex-1 relative">
                                <div class="absolute top-1 left-1 text-[9px] opacity-70">DLR <span id="bj-dlr-val"></span></div>
                                <div id="bj-dlr-cards" class="flex justify-center items-center h-10 gap-1 mt-2 text-sm tracking-widest">
                                    <!-- Cards -->
                                </div>
                            </div>
                            
                            <div class="border-2 border-[var(--lcd-pixel)] p-1 flex-1 relative">
                                <div class="absolute top-1 left-1 text-[9px] opacity-70">YOU <span id="bj-plr-val"></span></div>
                                <div id="bj-plr-cards" class="flex justify-center items-center h-10 gap-1 mt-2 text-sm tracking-widest">
                                    <!-- Cards -->
                                </div>
                            </div>

                            <div class="flex gap-2 shrink-0 mt-1" id="bj-actions">
                                <button onclick="bjHit()" class="nokia-btn nokia-btn-outline flex-1 py-2 font-bold text-center justify-center">HIT</button>
                                <button onclick="bjStand()" class="nokia-btn nokia-btn-outline flex-1 py-2 font-bold text-center justify-center">STAND</button>
                            </div>
                        </div>

                        <div class="p-2 shrink-0 border-t-2 border-dashed border-[var(--lcd-pixel)]">
                            <button onclick="switchView('gamble-menu-view')" class="nokia-btn nokia-btn-outline w-full py-1 text-[10px]">
                                [ LEAVE TABLE ]
                            </button>
                        </div>
                    </div>

                    <!-- === INTERVIEW VIEW === -->
                    <div id="interview-view" class="w-full h-full hidden flex-col relative">
                        <div class="bg-[var(--lcd-pixel)] text-[var(--lcd-bg)] text-[10px] px-2 py-1 flex justify-between items-center shrink-0">
                            <span class="blinking">INTERVIEW</span>
                            <span id="interview-timer">00.0</span>
                        </div>
                        
                        <div class="flex-1 flex flex-col p-4 gap-4 justify-center relative overflow-hidden">
                            <div id="interview-q" class="text-[11px] font-bold text-center min-h-[40px] flex items-center justify-center">
                                QUESTION
                            </div>
                            
                            <div id="interview-answers" class="flex flex-col gap-2 relative">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                    </div>
                </main>

                <!-- Toast Overlay (Centered on Screen) -->
                <div id="toast-container" class="absolute inset-0 pointer-events-none z-50 flex items-center justify-center p-4"></div>
            </div>
        </div>

        <!-- Physical Keypad Area (Aesthetic) -->
        <div class="mt-6 flex flex-col gap-2 px-2">
            <div class="flex justify-between">
                <div class="w-10 h-6 bg-zinc-700 rounded-full shadow-md border-b-2 border-zinc-900"></div>
                <div class="w-16 h-8 bg-zinc-700 rounded-lg shadow-md border-b-2 border-zinc-900 mx-auto"></div>
                <div class="w-10 h-6 bg-zinc-700 rounded-full shadow-md border-b-2 border-zinc-900"></div>
            </div>
            <div class="grid grid-cols-3 gap-3 mt-4">
                <div class="h-6 bg-zinc-700 rounded-full shadow-sm border-b-2 border-zinc-900"></div>
                <div class="h-6 bg-zinc-700 rounded-full shadow-sm border-b-2 border-zinc-900"></div>
                <div class="h-6 bg-zinc-700 rounded-full shadow-sm border-b-2 border-zinc-900"></div>
            </div>
        </div>
    </div>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/work.js"></script>
    <script src="js/casino.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
